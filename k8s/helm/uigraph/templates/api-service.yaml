apiVersion: v1
kind: Service
metadata:
  name: {{ include "uigraph.componentFullname" (dict "root" . "component" "api") }}
  labels:
    {{- include "uigraph.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
  selector:
    {{- include "uigraph.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
