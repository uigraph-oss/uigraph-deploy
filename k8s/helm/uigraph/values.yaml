# Default values for the uigraph Helm chart.
# Targets an existing AWS EKS cluster with managed backing services (RDS, ElastiCache, S3)
# and AWS Load Balancer Controller already installed. See ../../README.md for prerequisites.

nameOverride: ''
fullnameOverride: ''

image:
  pullPolicy: IfNotPresent
  pullSecrets: []

# Shared ServiceAccount used by uigraph-api and uigraph-gateway (the two services that talk to S3).
# Annotate with an IRSA role ARN to let those pods assume AWS credentials without static keys —
# see the "IRSA" section in ../../README.md for the prerequisite (uigraph-api S3 client must honor
# the default AWS credential chain when STORAGE_ACCESS_KEY/STORAGE_SECRET_KEY are unset).
serviceAccount:
  create: true
  name: ''
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/uigraph-irsa

# Secrets. By default the chart renders a single Secret from `secrets.values` below.
# Set `existingSecret` to reference a Secret you manage externally (e.g. via External Secrets
# Operator syncing from AWS Secrets Manager) — the chart will then reference it by key name
# instead of rendering its own, and `secrets.values` is ignored.
secrets:
  existingSecret: ''
  keys:
    uigraphSecretKey: uigraph-secret-key
    storageAccessKey: storage-access-key
    storageSecretKey: storage-secret-key
    postgresPassword: postgres-password
    adminPassword: admin-password
    figmaClientSecret: figma-client-secret
    redisAuthToken: redis-auth-token
  # Only used when secrets.existingSecret is empty. Leave blank and pass with
  # `--set secrets.values.xxx=...` or a values override file — do not commit real secrets here.
  values:
    uigraphSecretKey: ''
    storageAccessKey: ''
    storageSecretKey: ''
    postgresPassword: ''
    adminPassword: ''
    figmaClientSecret: ''
    redisAuthToken: ''

# Managed Postgres (RDS). Password comes from the Secret (secrets.keys.postgresPassword).
postgres:
  host: ''
  port: 5432
  database: uigraph
  user: uigraph
  sslmode: require

# Managed Redis (ElastiCache). REDIS_URL is built from these fields; the AUTH token (if any)
# comes from the Secret (secrets.keys.redisAuthToken) and is substituted in via Kubernetes'
# $(VAR) env expansion, never stored in the ConfigMap.
# NOTE: rediss://+AUTH-token support depends on uigraph-api — see Assumptions in ../../README.md.
# Defaults to plain redis:// (no TLS/AUTH) until that's confirmed.
redis:
  host: ''
  port: 6379
  tls: false
  authEnabled: false

# Object storage. Defaults to real AWS S3 (STORAGE_BACKEND=s3), replacing the compose file's
# bundled MinIO entirely.
storage:
  backend: s3
  bucket: ''
  region: us-east-1
  # Leave empty to use the AWS SDK's default S3 endpoint. Only set this for S3-compatible
  # alternatives (e.g. an on-prem gateway).
  endpoint: ''
  # Public URL used when generating links shown to users, e.g. the bucket's virtual-hosted URL
  # (https://<bucket>.s3.<region>.amazonaws.com) or a CloudFront domain in front of it.
  publicEndpoint: ''
  forcePathStyle: false

# Public-facing app configuration.
app:
  # Base domain used to derive ingress hosts and public URLs (app.<domain>, sync.<domain>).
  domain: ''
  # Override the computed https://app.<app.domain> if you need a different public URL.
  publicUrl: ''
  frontendUrl: ''
  adminEmail: admin@uigraph.app

figma:
  clientId: ''
  # clientSecret is read from the Secret (secrets.keys.figmaClientSecret); leave figma.clientId
  # empty to disable the Figma integration entirely.
  redirectUri: ''

ingress:
  enabled: true
  className: alb
  certificateArn: ''
  scheme: internet-facing
  # Defaults to app.<app.domain> / sync.<app.domain> when left empty.
  appHost: ''
  gatewayHost: ''
  # Set gatewayIngress.enabled: false below to keep uigraph-gateway ClusterIP-only (no external
  # CI access) if you don't need `uigraph-cli` to sync from outside the cluster.
  gatewayIngress:
    enabled: true
  annotations: {}

api:
  image:
    repository: uigraph/uigraph-api
    tag: '1.0.3'
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: '1', memory: 512Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

graphql:
  image:
    repository: uigraph/uigraph-graphql
    tag: '1.0.2'
  replicaCount: 2
  port: 8090
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

gateway:
  image:
    repository: uigraph/uigraph-gateway
    tag: '1.0.1'
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

ui:
  image:
    repository: uigraph/uigraph-ui
    tag: '1.0.3'
  replicaCount: 2
  port: 80
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
